<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Hub3D - Cadastro de Anúncio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🚀 Novo Anúncio Multi-Canal (Impressão 3D)</h2>
    
    <form id="productForm">
        <div class="form-group">
            <label for="title">Título do Anúncio</label>
            <input type="text" id="title" placeholder="Ex: Action Figure Pokémon - Articulado 15cm" required>
        </div>

        <div class="form-row">
            <div class="form-group flex-1">
                <label for="price">Preço de Venda (R$)</label>
                <input type="number" id="price" step="0.01" placeholder="0,00" required>
            </div>
            <div class="form-group flex-1">
                <label for="stock">Estoque Virtual</label>
                <input type="number" id="stock" placeholder="Ex: 99" required>
            </div>
        </div>

        <div class="form-group highlight-box">
            <label for="productionTime">⏱️ Prazo de Produção / Impressão</label>
            <div class="input-with-suffix">
                <input type="number" id="productionTime" min="0" placeholder="Ex: 3" required>
                <span>dias úteis</span>
            </div>
            <small>Tempo necessário para imprimir, dar acabamento e embalar.</small>
        </div>

        <div class="form-group">
            <label>📸 Fotos do Produto</label>
            <div class="upload-container" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                <p>Clique ou arraste as fotos da sua impressão aqui</p>
                <button type="button" class="btn-secondary" onclick="document.getElementById('fileInput').click()">Selecionar Fotos</button>
            </div>
            <div class="preview-container" id="previewContainer"></div>
        </div>

        <div class="form-group">
            <label for="description">Descrição do Anúncio</label>
            <textarea id="description" placeholder="Escreva os detalhes. Dica: informe o material (PLA, ABS, Resina)..."></textarea>
        </div>

        <div class="form-group">
            <label>Publicar simultaneamente em:</label>
            <div class="marketplaces-grid">
                <label class="marketplace-option">
                    <input type="checkbox" name="platform" value="mercado_livre">
                    💛 Mercado Livre
                </label>
                <label class="marketplace-option">
                    <input type="checkbox" name="platform" value="shopee">
                    🧡 Shopee
                </label>
                <label class="marketplace-option">
                    <input type="checkbox" name="platform" value="amazon">
                    🖤 Amazon
                </label>
                <label class="marketplace-option">
                    <input type="checkbox" name="platform" value="magalu">
                    💙 Magalu
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit">Enviar para Produção e Lojas</button>
    </form>
</div>

<script src="app.js"></script>
</body>
</html>
